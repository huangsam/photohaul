# Migrator mode
migrator.mode=PATH

# Source path on local to visit photos
path.source=Dummy/Source

# Target path on local to upload photos
path.target=Dummy/Target

# Can be [MOVE, COPY]
path.action=COPY

# Enable dry run mode (default: false)
dryrun.enabled=true

# Enable delta migration to skip unchanged files (default: false)
# When enabled, only new or modified files will be migrated
# delta.enabled=true

# Folder structure to organize photos. Components separated by "/" (default: yearTaken)
# Supported components: yearTaken, yearModified, make, model, focalLength, shutterSpeed, aperture, flash, iso
folder.structure=yearTaken/make
